bastion:
- name: bastion_internet  # # bastion accepting connections from internet
  port: 22
  src: internet
  dest: bastion
mongodb:
- name: mongodb_bastion  # MongoDB accepting connections from bastion
  port: 22
  src: bastion
  dest: mongodb
- name: mongodb_catalogue # MongoDB accepting connections from Catalogue
  port: 27017
  src: catalogue
  dest: mongodb
- name: mongodb_user       # # MongoDB accepting connections from user
  port: 27017
  src: user
  dest: mongodb